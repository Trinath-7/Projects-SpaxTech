<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Task Manager</title>
    <meta name="description" content="A premium, interactive task manager for organizing your day.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


    <main class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>Task Master</h1>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <i class="fas fa-sun"></i>
                </button>
            </div>
            
            <form id="task-form" class="task-form" novalidate>
                <div class="input-group">
                    <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
                    <div class="options-row">
                        <select id="task-priority" aria-label="Task Priority">
                            <option value="low">Low Priority</option>
                            <option value="medium" selected>Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                        <input type="text" id="task-datetime" placeholder="Set Date & Time">
                    </div>
                </div>
                <button type="submit" class="primary-btn" id="add-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </form>
        </header>

        <section class="dashboard">
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-active">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <div class="filters-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </section>

        <section class="task-list-container">
            <ul id="task-list" class="task-list">
                <!-- Tasks will be dynamically injected here -->
            </ul>
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon"><i class="fas fa-clipboard-list"></i></div>
                <p>No tasks found. Time to relax or add a new one!</p>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
